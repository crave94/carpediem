{% extends "base.html" %}
{% block title %}Iniciar sesión · Carpediem{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-start min-vh-50 pt-4 pb-4">
  <div class="w-100" style="max-width: 420px;">
    <div class="card login-card shadow-lg" style="
      background: linear-gradient(145deg, #1e1e2e 0%, #161622 100%);
      border: 1px solid var(--ms-purple);
      border-radius: 16px;
    ">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="h3 fw-bold mt-2 mb-1" style="background: linear-gradient(135deg, var(--ms-purple-light), var(--ms-purple), var(--ms-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Carpediem
          </h1>
          <p class="text-body-secondary small mb-0">Iniciá sesión para continuar</p>
        </div>

        <form method="post" action="{{ url_for('login') }}" autocomplete="on">
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold" style="color: var(--ms-purple-light);">Usuario</label>
            <div class="input-group">
              <span class="input-group-text" style="background: var(--bg); border-color: var(--ms-purple); color: var(--ms-purple);">
                <i class="bi bi-person-fill"></i>
              </span>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                required
                autofocus
                autocomplete="username"
                style="background: var(--bg); border-color: var(--ms-purple); color: var(--text);"
              >
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold" style="color: var(--ms-purple-light);">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text" style="background: var(--bg); border-color: var(--ms-purple); color: var(--ms-purple);">
                <i class="bi bi-lock-fill"></i>
              </span>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                required
                autocomplete="current-password"
                style="background: var(--bg); border-color: var(--ms-purple); color: var(--text);"
              >
            </div>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-lg fw-semibold py-3" style="
              background: linear-gradient(135deg, var(--ms-purple), var(--ms-blue));
              border: none;
              border-radius: 10px;
              color: white;
              box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
              transition: all 0.2s ease;
            " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 28px rgba(168, 85, 247, 0.6)';"
               onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 20px rgba(168, 85, 247, 0.4)';">
              <i class="bi bi-box-arrow-in-right me-2"></i>Entrar al Clan
            </button>
          </div>
        </form>

        <hr class="my-4" style="border-color: var(--ms-purple); opacity: 0.3;">
        <div class="d-grid mt-3">
          <a href="{{ url_for('login_discord') }}" class="btn btn-lg fw-semibold py-3" style="
            background-color: #5865F2;
            border: none;
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
            transition: all 0.2s ease;
          " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 28px rgba(88, 101, 242, 0.6)';"
             onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 20px rgba(88, 101, 242, 0.4)';">
            <i class="bi bi-discord me-2"></i>Iniciar sesión con Discord
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
@keyframes allan-glow {
  0%, 100% {
    box-shadow:
      0 0 0 4px #161622,
      0 0 24px rgba(168, 85, 247, 0.5),
      0 0 48px rgba(59, 130, 246, 0.3);
  }
  50% {
    box-shadow:
      0 0 0 4px #161622,
      0 0 32px rgba(168, 85, 247, 0.8),
      0 0 64px rgba(59, 130, 246, 0.5);
  }
}

@media (prefers-reduced-motion: reduce) {
  img {
    animation: none !important;
  }
}
</style>
{% endblock %}
